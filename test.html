<!DOCTYPE html>     
  <html lang="en">
  <head>                                                                                                                                                                                                       <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                                                               
    <title>LoginScreenContainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #F9F9F9;
        font-family: 'Public Sans', sans-serif;
        padding: 16px;
      }
      .submit-btn:hover {
        opacity: 0.9;
      }
      .form-input:focus {
        outline: 2px solid #9447B0;
        outline-offset: 1px;
        border-color: #9447B0;
      }
    </style>
  </head>
  <body>

    <div id="LoginScreenContainer" style="display: flex; flex-direction: column; gap: 32px; width: 300px;">

      <div style="display: flex; flex-direction: row; gap: 7.5px; align-items: center; justify-content: flex-start;">
          <div style="width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; background-color: #f0f0f0; border-radius: 8px;">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="#9447B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2 7L12 12" stroke="#9447B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M12 22V12" stroke="#9447B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M22 7L12 12" stroke="#9447B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M17 4.5L7 9.5" stroke="#9447B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
          </div>
          <div style="display: flex; flex-direction: column;">
              <span style="font-family: 'Open Sans', sans-serif; font-size: 24px; font-weight: 600; line-height: 1;">Launcher</span>
              <span style="font-family: 'Open Sans', sans-serif; font-size: 9px; font-weight: 400; line-height: 1; color: #706B7D;">Admin Studio</span>
          </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 4.5px;">
        <h1 style="font-family: 'Public Sans', sans-serif; font-size: 19.5px; font-weight: 500; color: rgb(71,69,87); line-height: 1.2;">Welcome to Admin Studio!</h1>
        <p style="font-family: 'Public Sans', sans-serif; font-size: 14px; font-weight: 400; color: rgb(112,107,125); line-height: 1.4;">Enter your username and password to access your account.</p>      
      </div>

      <form id="login-form" style="display: flex; flex-direction: column; gap: 12px;" novalidate>

        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label for="username" style="font-family: 'Public Sans', sans-serif; font-size: 14px; font-weight: 500; color: rgb(71,69,87);">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            class="form-input"
            style="width: 100%; padding: 7px 14px; border-radius: 6px; border: 1px solid rgb(219,217,222); font-family: 'Public Sans', sans-serif; font-size: 14px; transition: all 0.2s ease;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label for="password" style="font-family: 'Public Sans', sans-serif; font-size: 14px; font-weight: 500; color: rgb(71,69,87);">Password</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              class="form-input"
              style="width: 100%; padding: 7px 40px 7px 14px; border-radius: 6px; border: 1px solid rgb(219,217,222); font-family: 'Public Sans', sans-serif; font-size: 14px; transition: all 0.2s ease;">
            <button type="button" id="toggle-password" aria-label="Show password" style="position: absolute; right: 8px; background: none; border: none; cursor: pointer; display: flex; align-items:      
  center; justify-content: center; padding: 4px; color: #706B7D;">
              <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1        
  1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
              <svg id="eye-on-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round" style="display: none;">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="submit-btn"
          style="width: 100%; padding: 10px 20px; background-color: rgb(148,71,176); color: rgb(255,255,255); border-radius: 6px; border: none; font-family: 'Public Sans', sans-serif; font-size: 14px;   
  font-weight: 500; cursor: pointer; box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.3); transition: opacity 0.2s ease;">
          Login
        </button>

      </form>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const passwordInput = document.getElementById("password");
        const toggleButton = document.getElementById("toggle-password");
        const eyeOnIcon = document.getElementById("eye-on-icon");
        const eyeOffIcon = document.getElementById("eye-off-icon");

        if (toggleButton && passwordInput) {
          toggleButton.addEventListener("click", () => {
            const isPassword = passwordInput.getAttribute("type") === "password";

            if (isPassword) {
              passwordInput.setAttribute("type", "text");
              toggleButton.setAttribute("aria-label", "Hide password");
              eyeOnIcon.style.display = "block";
              eyeOffIcon.style.display = "none";
            } else {
              passwordInput.setAttribute("type", "password");
              toggleButton.setAttribute("aria-label", "Show password");
              eyeOnIcon.style.display = "none";
              eyeOffIcon.style.display = "block";
            }
          });
        }

        const usernameInput = document.getElementById('username');
        if (usernameInput) {
          usernameInput.focus();
        }
      });
    </script>

  </body>
  </html>
